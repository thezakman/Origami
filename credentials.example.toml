# Origami OSINT API credentials — example.
#
# Used by the `--origin` fold (origin-IP discovery + IP-based WAF bypass) to pull
# candidate origin IPs from keyed sources. All of these are OPTIONAL — with none
# set, `--origin` falls back to keyless crt.sh.
#
# SETUP (option B, recommended):
#   origami --init-credentials          # creates ~/.config/origami/credentials.toml (mode 0600)
#   $EDITOR ~/.config/origami/credentials.toml
# ...then paste your keys below the matching section and uncomment it.
#
# Or copy this file:
#   mkdir -p ~/.config/origami
#   cp credentials.example.toml ~/.config/origami/credentials.toml
#   chmod 600 ~/.config/origami/credentials.toml
#
# Precedence: environment variables ALWAYS override this file, e.g.
#   SHODAN_API_KEY=... origami https://target --origin
#
# Keep the real file PRIVATE (mode 0600) — these are bearer secrets. Never commit it.

# Shodan — https://account.shodan.io  (env: SHODAN_API_KEY)
[shodan]
api_key = "your-shodan-api-key"

# SecurityTrails — https://securitytrails.com  (env: SECURITYTRAILS_API_KEY)
# Historical A records: the classic "origin behind the CDN" leak.
[securitytrails]
api_key = "your-securitytrails-api-key"

# Censys — https://search.censys.io/account/api  (env: CENSYS_API_ID / CENSYS_API_SECRET)
[censys]
api_id = "your-censys-api-id"
api_secret = "your-censys-api-secret"
